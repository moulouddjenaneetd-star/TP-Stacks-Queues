<script>

const CODE = [
[
`<span class="cm">// ── Node & Stack structures ─────────────────────────</span>`,
`<span class="kw">typedef</span> <span class="kw">struct</span> Node {`,
`    <span class="kw">int</span> <span class="field">data</span>;`,
`    <span class="kw">struct</span> Node* <span class="field">next</span>;`,
`} Node;`,
``,
`<span class="kw">typedef</span> <span class="kw">struct</span> {`,
`    Node* <span class="field">top</span>;`,
`} Stack;`,
``,
`<span class="cm">// ── 1. Push ─────────────────────────────────────────</span>`,
`<span class="kw">void</span> <span class="fn">push</span>(Stack* s, <span class="kw">int</span> val) {`,
`    Node* newNode = <span class="fn">malloc</span>(<span class="kw">sizeof</span>(Node));`,
`    newNode-><span class="field">data</span> = val;`,
`    newNode-><span class="field">next</span> = s-><span class="field">top</span>;`,
`    s-><span class="field">top</span> = newNode;`,
`}`,
``,
`<span class="cm">// ── 2. Pop ──────────────────────────────────────────</span>`,
`<span class="kw">int</span> <span class="fn">pop</span>(Stack* s) {`,
`    <span class="kw">if</span> (s-><span class="field">top</span> == <span class="kw">NULL</span>) {`,
`        <span class="fn">printf</span>(<span class="str">"Stack is empty!\\n"</span>);`,
`        <span class="kw">return</span> -<span class="num">1</span>;`,
`    }`,
`    Node* temp = s-><span class="field">top</span>;`,
`    <span class="kw">int</span> val = temp-><span class="field">data</span>;`,
`    s-><span class="field">top</span> = s-><span class="field">top</span>-><span class="field">next</span>;`,
`    <span class="fn">free</span>(temp);`,
`    <span class="kw">return</span> val;`,
`}`,
``,
`<span class="cm">// ── 3. Display ──────────────────────────────────────</span>`,
`<span class="kw">void</span> <span class="fn">display</span>(Stack* s) {`,
`    Node* curr = s-><span class="field">top</span>;`,
`    <span class="fn">printf</span>(<span class="str">"TOP -&gt; "</span>);`,
`    <span class="kw">while</span> (curr != <span class="kw">NULL</span>) {`,
`        <span class="fn">printf</span>(<span class="str">"[%d] -&gt; "</span>, curr-><span class="field">data</span>);`,
`        curr = curr-><span class="field">next</span>;`,
`    }`,
`    <span class="fn">printf</span>(<span class="str">"NULL\\n"</span>);`,
`}`,
],

[
`<span class="cm">// ── Queue structure (reuses Node from Ex1) ──────────</span>`,
`<span class="kw">typedef</span> <span class="kw">struct</span> {`,
`    Node* <span class="field">front</span>;`,
`    Node* <span class="field">rear</span>;`,
`} Queue;`,
``,
`<span class="cm">// ── 1. Enqueue ──────────────────────────────────────</span>`,
`<span class="kw">void</span> <span class="fn">enqueue</span>(Queue* q, <span class="kw">int</span> val) {`,
`    Node* newNode = <span class="fn">malloc</span>(<span class="kw">sizeof</span>(Node));`,
`    newNode-><span class="field">data</span> = val;`,
`    newNode-><span class="field">next</span> = <span class="kw">NULL</span>;`,
`    <span class="kw">if</span> (q-><span class="field">rear</span> == <span class="kw">NULL</span>) {`,
`        q-><span class="field">front</span> = q-><span class="field">rear</span> = newNode;`,
`        <span class="kw">return</span>;`,
`    }`,
`    q-><span class="field">rear</span>-><span class="field">next</span> = newNode;`,
`    q-><span class="field">rear</span> = newNode;`,
`}`,
``,
`<span class="cm">// ── 2. Dequeue ──────────────────────────────────────</span>`,
`<span class="kw">int</span> <span class="fn">dequeue</span>(Queue* q) {`,
`    <span class="kw">if</span> (q-><span class="field">front</span> == <span class="kw">NULL</span>) {`,
`        <span class="fn">printf</span>(<span class="str">"Queue is empty!\\n"</span>);`,
`        <span class="kw">return</span> -<span class="num">1</span>;`,
`    }`,
`    Node* temp = q-><span class="field">front</span>;`,
`    <span class="kw">int</span> val = temp-><span class="field">data</span>;`,
`    q-><span class="field">front</span> = q-><span class="field">front</span>-><span class="field">next</span>;`,
`    <span class="kw">if</span> (q-><span class="field">front</span> == <span class="kw">NULL</span>) q-><span class="field">rear</span> = <span class="kw">NULL</span>;`,
`    <span class="fn">free</span>(temp);`,
`    <span class="kw">return</span> val;`,
`}`,
``,
`<span class="cm">// ── 3. Reverse queue using a stack ──────────────────</span>`,
`<span class="kw">void</span> <span class="fn">reverseQueue</span>(Queue* q) {`,
`    Stack s;  s.<span class="field">top</span> = <span class="kw">NULL</span>;`,
`    <span class="kw">while</span> (q-><span class="field">front</span> != <span class="kw">NULL</span>)`,
`        <span class="fn">push</span>(&amp;s, <span class="fn">dequeue</span>(q));`,
`    <span class="kw">while</span> (s.<span class="field">top</span> != <span class="kw">NULL</span>)`,
`        <span class="fn">enqueue</span>(q, <span class="fn">pop</span>(&amp;s));`,
`}`,
],
// ── EX3 ──────────────────────────────────────────────────────
[
`<span class="cm">// ── Sort stack using one extra stack ────────────────</span>`,
`<span class="cm">// After sorting: smallest element on TOP</span>`,
`<span class="kw">void</span> <span class="fn">sortStack</span>(Stack* input) {`,
`    Stack temp;`,
`    temp.<span class="field">top</span> = <span class="kw">NULL</span>;`,
``,
`    <span class="kw">while</span> (input-><span class="field">top</span> != <span class="kw">NULL</span>) {`,
`        <span class="kw">int</span> tmp = <span class="fn">pop</span>(input);`,
``,
`        <span class="kw">while</span> (temp.<span class="field">top</span> != <span class="kw">NULL</span> &&`,
`               temp.<span class="field">top</span>-><span class="field">data</span> > tmp)`,
`            <span class="fn">push</span>(input, <span class="fn">pop</span>(&amp;temp));`,
``,
`        <span class="fn">push</span>(&amp;temp, tmp);`,
`    }`,
``,
`    <span class="cm">// Copy sorted elements back to input</span>`,
`    <span class="kw">while</span> (temp.<span class="field">top</span> != <span class="kw">NULL</span>)`,
`        <span class="fn">push</span>(input, <span class="fn">pop</span>(&amp;temp));`,
`}`,
],

[
`<span class="cm">// Uses same Node &amp; Queue from Ex.2 (int data)</span>`,
``,
`<span class="cm">// ── Generate first N binary numbers ─────────────────</span>`,
`<span class="kw">void</span> <span class="fn">generateBinary</span>(<span class="kw">int</span> n) {`,
`    Queue q = {<span class="kw">NULL</span>, <span class="kw">NULL</span>};`,
``,
`    <span class="fn">enqueue</span>(&amp;q, <span class="num">1</span>);`,
``,
`    <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">0</span>; i &lt; n; i++) {`,
`        <span class="kw">int</span> curr = <span class="fn">dequeue</span>(&amp;q);`,
`        <span class="fn">printf</span>(<span class="str">"%d\\n"</span>, curr);`,
`        <span class="fn">enqueue</span>(&amp;q, curr * <span class="num">10</span>);`,
`        <span class="fn">enqueue</span>(&amp;q, curr * <span class="num">10</span> + <span class="num">1</span>);`,
`    }`,
`}`,
],
];

const FNAMES = ['stack.c','queue.c','sort_stack.c','binary.c'];


const STEPS = [
[
 {lines:[0,1,2,3,4,5,6,7,8],op:'init',text:`We define a <code>Node</code> struct with two fields: <b>data</b> (stores the integer value) and <b>next</b> (pointer to the next node). A <code>Stack</code> wraps a single pointer <code>top</code> — it points to the topmost node, or <b>NULL</b> when empty.`,state:{stack:[],newNode:null,hiIdx:-1,popIdx:-1,currIdx:-1,vars:{},output:[]}},
 {lines:[10,11],op:'push',text:`We call <code>push(s, 3)</code>. The function receives a pointer to the stack and the value <b>3</b> to insert.`,state:{stack:[],newNode:null,hiIdx:-1,popIdx:-1,currIdx:-1,vars:{val:3},output:[]}},
 {lines:[12],op:'push',text:`<code>malloc(sizeof(Node))</code> allocates heap memory for a brand-new node. We store the pointer in <code>newNode</code>. The node's contents are still uninitialized (shown as <b>?</b>).`,state:{stack:[],newNode:{val:'?',phase:'alloc'},hiIdx:-1,popIdx:-1,currIdx:-1,vars:{val:3},output:[]}},
 {lines:[13],op:'push',text:`<code>newNode->data = val</code> — we write <b>3</b> into the data field of the new node.`,state:{stack:[],newNode:{val:3,phase:'data'},hiIdx:-1,popIdx:-1,currIdx:-1,vars:{val:3},output:[]}},
 {lines:[14],op:'push',text:`<code>newNode->next = s->top</code> — the stack is currently empty, so <code>s->top</code> is <b>NULL</b>. We set <code>newNode->next = NULL</code>.`,state:{stack:[],newNode:{val:3,phase:'next'},hiIdx:-1,popIdx:-1,currIdx:-1,vars:{val:3},output:[]}},
 {lines:[15],op:'push',text:`<code>s->top = newNode</code> — the stack's top pointer now points to our new node. <b>Push complete!</b> Stack: <b>3 → NULL</b>`,state:{stack:[3],newNode:null,hiIdx:0,popIdx:-1,currIdx:-1,vars:{},output:[]}},
 {lines:[11,12,13,14],op:'push',text:`<code>push(s, 1)</code> — allocate a new node, set <code>data = 1</code>, then <code>next = s->top</code> which currently points to node <b>3</b>. The new node is being linked in.`,state:{stack:[3],newNode:{val:1,phase:'next'},hiIdx:-1,popIdx:-1,currIdx:-1,vars:{val:1},output:[]}},
 {lines:[15],op:'push',text:`<code>s->top = newNode</code> — node <b>1</b> is now on top, pointing to node <b>3</b>. Stack: <b>1 → 3 → NULL</b>`,state:{stack:[1,3],newNode:null,hiIdx:0,popIdx:-1,currIdx:-1,vars:{},output:[]}},
 {lines:[11,12,13,14,15],op:'push',text:`<code>push(s, 4)</code> — create node with <code>data=4</code>, link its <code>next</code> to node <b>1</b>, update <code>top</code>. Stack: <b>4 → 1 → 3 → NULL</b>`,state:{stack:[4,1,3],newNode:null,hiIdx:0,popIdx:-1,currIdx:-1,vars:{},output:[]}},
 {lines:[18,19],op:'pop',text:`Now we call <code>pop(s)</code>. It will remove and return the top element.`,state:{stack:[4,1,3],newNode:null,hiIdx:-1,popIdx:-1,currIdx:-1,vars:{},output:[]}},
 {lines:[20],op:'pop',text:`<code>if (s->top == NULL)</code> — the stack is NOT empty (top → node 4). We skip the error branch and proceed.`,state:{stack:[4,1,3],newNode:null,hiIdx:0,popIdx:-1,currIdx:-1,vars:{},output:[]}},

function mkNode(val, nextTxt, cls='') {
  return `<div class="node-box ${cls}"><div class="nd">${val}</div><div class="nn"><div class="nl">next</div><div class="nv">${nextTxt}</div></div></div>`;
}

function renderStack1(st) {
  const {stack,newNode,hiIdx,popIdx,currIdx,vars,output} = st;
  let h = `<div class="stack-wrap">`;
  const opMap = {push:'ob-push',pop:'ob-pop',disp:'ob-disp',init:'ob-init'};
  h += `<div class="top-ptr"><span>TOP</span><div class="top-ptr-arrow">▼</div></div>`;
  if (newNode) {
    const nxt = newNode.phase==='next' ? (stack.length>0?`→${stack[0]}`:'→NULL') : (newNode.phase==='alloc'?'?':'?');
    h += mkNode(newNode.val, nxt, 'n-new');
    h += `<div style="color:#3fb950;font-size:0.75rem;text-align:center;">↑ new node (pending push)</div>`;
    h += `<div class="node-down-arr">↓</div>`;
  }
  if (stack.length===0 && !newNode) {
    h += `<div class="null-box">NULL (empty)</div>`;
  } else {
    for (let i=0;i<stack.length;i++) {
      const nxt = i<stack.length-1 ? `→${stack[i+1]}` : '→NULL';
      let cls = '';
      if (i===hiIdx) cls='n-hi';
      if (i===popIdx) cls='n-pop';
      if (i===currIdx) cls='n-curr';
      h += mkNode(stack[i], nxt, cls);
      if (i<stack.length-1) h += `<div class="node-down-arr">↓</div>`;
    }
    h += `<div class="node-down-arr">↓</div>`;
    h += `<div class="null-box">NULL</div>`;
  }
  if (Object.keys(vars).length>0) {
    h += `<div class="vars-row">`;
    for(const[k,v] of Object.entries(vars)) h+=`<div class="vchip"><span class="vn">${k}</span><span class="veq">=</span><span class="vv">${v}</span></div>`;
    h += `</div>`;
  }
  if (output&&output.length>0) {
    h += `<div class="out-box"><div class="out-lbl">Output / Return:</div>`;
    output.forEach(l=>h+=`<div class="out-line">${l}</div>`);
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function renderQueue2(st) {
  const {queue,newNode,popIdx,stack,vars,output,revPhase} = st;
  let h = `<div class="q-wrap">`;
  h += `<div style="font-size:0.75rem;color:#8b949e;font-weight:700;margin-bottom:10px;">QUEUE (FIFO)</div>`;

  h += `<div style="display:flex;align-items:flex-end;gap:3px;flex-wrap:wrap;justify-content:center">`;
  if (queue.length===0 && !newNode) {
    h += `<div style="display:inline-flex;flex-direction:column;align-items:center"><div style="height:22px"></div><div class="null-box">NULL (empty)</div></div>`;
  } else {
    for (let i=0;i<queue.length;i++) {
      const isFirst = i===0;
      const isRear  = i===queue.length-1;
      const nxt = i<queue.length-1 ? `→${queue[i+1]}` : (newNode?`→${newNode.val}`:'→NULL');
      let cls = i===popIdx ? 'n-pop' : '';
      let lbl = '';
      if (isFirst && isRear && !newNode)
        lbl = `<span style="font-size:0.62rem;font-family:monospace;color:#f78166;font-weight:700">FRONT↓</span>&nbsp;<span style="font-size:0.62rem;font-family:monospace;color:#3fb950;font-weight:700">REAR↓</span>`;
      else if (isFirst)
        lbl = `<span style="font-size:0.62rem;font-family:monospace;color:#f78166;font-weight:700">FRONT↓</span>`;
      else if (isRear)
        lbl = `<span style="font-size:0.62rem;font-family:monospace;color:#3fb950;font-weight:700">REAR↓</span>`;
      h += `<div style="display:inline-flex;flex-direction:column;align-items:center">`;
      h += `<div style="height:22px;display:flex;align-items:center;justify-content:center;gap:4px">${lbl}</div>`;
      h += mkNode(queue[i],nxt,cls);
      h += `</div>`;
      if (i<queue.length-1) h+=`<div class="node-arr" style="align-self:flex-end;padding-bottom:13px">→</div>`;
    }
    if (newNode) {
      h += `<div class="node-arr" style="align-self:flex-end;padding-bottom:13px">→</div>`;
      h += `<div style="display:inline-flex;flex-direction:column;align-items:center">`;
      h += `<div style="height:22px;display:flex;align-items:center;justify-content:center"><span style="font-size:0.62rem;font-family:monospace;color:#3fb950;font-weight:700">REAR*↓</span></div>`;
      h += mkNode(newNode.val,'→NULL','n-new');
      h += `</div>`;
    }
    h += `<div class="node-arr" style="align-self:flex-end;padding-bottom:13px">→</div>`;
    h += `<div class="null-box" style="align-self:flex-end;padding-bottom:5px">NULL</div>`;
  }
  h += `</div>`;

  if (revPhase>0) {
    const banner = revPhase===1 ? '▶ Phase 1: Draining Queue → Stack' : '▶ Phase 2: Refilling Stack → Queue';
    h += `<div style="margin-top:10px;text-align:center"><span style="font-size:0.72rem;color:#f0883e;font-weight:700;background:#1e1322;border:1px solid #9e4a00;border-radius:5px;padding:4px 12px">${banner}</span></div>`;
    h += `<div style="margin-top:12px;border-top:1px solid #30363d;padding-top:10px">`;
    h += `<div style="font-size:0.75rem;color:#8b949e;font-weight:700;text-align:center;margin-bottom:6px">TEMP STACK</div>`;
    h += `<div class="stack-wrap" style="margin-top:0">`;
    h += `<div class="top-ptr"><span>TOP</span><div class="top-ptr-arrow">▼</div></div>`;
    if (stack.length===0) {
      h += `<div class="null-box">NULL (empty)</div>`;
    } else {
      for (let i=0;i<stack.length;i++) {
        const nxt=i<stack.length-1?`→${stack[i+1]}`:'→NULL';
        h += mkNode(stack[i],nxt,i===0?'n-hi':'');
        if (i<stack.length-1) h+=`<div class="node-down-arr">↓</div>`;
      }
      h+=`<div class="node-down-arr">↓</div><div class="null-box">NULL</div>`;
    }
    h+=`</div></div>`;
  }

  if (Object.keys(vars).length>0) {
    h+=`<div class="vars-row">`;
    for(const[k,v] of Object.entries(vars)) h+=`<div class="vchip"><span class="vn">${k}</span><span class="veq">=</span><span class="vv">${v}</span></div>`;
    h+=`</div>`;
  }
  if (output&&output.length>0) {
    h+=`<div class="out-box"><div class="out-lbl">Output / Return:</div>`;
    output.forEach(l=>h+=`<div class="out-line">${l}</div>`);
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

function renderSort3(st) {
  const {input,temp,hiI,hiT,vars,movingVal} = st;
  let h = `<div class="two-stacks">`;
  // Input stack
  h += `<div class="named-stack">`;
  h += `<div class="ns-label">INPUT Stack</div>`;
  h += `<div class="top-ptr"><span>TOP</span><div class="top-ptr-arrow">▼</div></div>`;
  if(input.length===0){h+=`<div class="null-box">NULL (empty)</div>`;}
  else{
    for(let i=0;i<input.length;i++){
      const nxt=i<input.length-1?`→${input[i+1]}`:'→NULL';
      let cls=i===hiI?'n-hi':'';
      h+=mkNode(input[i],nxt,cls);
      if(i<input.length-1)h+=`<div class="node-down-arr">↓</div>`;
    }
    h+=`<div class="node-down-arr">↓</div><div class="null-box">NULL</div>`;
  }
  h+=`</div>`;

  h+=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px">`;
  if(movingVal!==null){
    h+=`<div style="font-size:0.75rem;color:#e3b341">moving...</div>`;
    h+=`<div class="node-box n-hi" style="animation:none"><div class="nd">${movingVal}</div><div class="nn"><div class="nl">tmp</div><div class="nv">buf</div></div></div>`;
  }
  if(Object.keys(vars).length>0){h+=`<div class="vars-row" style="flex-direction:column">`;for(const[k,v] of Object.entries(vars))h+=`<div class="vchip"><span class="vn">${k}</span><span class="veq">=</span><span class="vv">${v}</span></div>`;h+=`</div>`;}
  h+=`</div>`;

  h += `<div class="named-stack">`;
  h += `<div class="ns-label">TEMP Stack</div>`;
  h += `<div class="top-ptr"><span>TOP</span><div class="top-ptr-arrow">▼</div></div>`;
  if(temp.length===0){h+=`<div class="null-box">NULL (empty)</div>`;}
  else{
    for(let i=0;i<temp.length;i++){
      const nxt=i<temp.length-1?`→${temp[i+1]}`:'→NULL';
      let cls=i===hiT?'n-hi':'';
      h+=mkNode(temp[i],nxt,cls);
      if(i<temp.length-1)h+=`<div class="node-down-arr">↓</div>`;
    }
    h+=`<div class="node-down-arr">↓</div><div class="null-box">NULL</div>`;
  }
  h+=`</div>`;
  h+=`</div>`;
  return h;
}

function renderBinary4(st) {
  const {queue,output,curr,i} = st;
  let h=`<div class="q-wrap" style="gap:14px">`;
  h+=`<div style="font-size:0.75rem;color:#8b949e;font-weight:700">INT QUEUE — Binary Numbers via Digit Arithmetic (curr×10 | curr×10+1)</div>`;


  h+=`<div style="display:flex;align-items:flex-end;gap:3px;flex-wrap:wrap;justify-content:center">`;
  if (queue.length===0) {
    h+=`<div style="display:inline-flex;flex-direction:column;align-items:center"><div style="height:22px"></div><div class="null-box">NULL (empty)</div></div>`;
  } else {
    for (let j=0;j<queue.length;j++) {
      const nxt=j<queue.length-1?`→${queue[j+1]}`:'→NULL';
      const cls=j===0?'n-hi':'';
      let lbl='';
      if (j===0 && j===queue.length-1)
        lbl=`<span style="font-size:0.62rem;font-family:monospace;color:#f78166;font-weight:700">FRONT↓</span>&nbsp;<span style="font-size:0.62rem;font-family:monospace;color:#3fb950;font-weight:700">REAR↓</span>`;
      else if (j===0)
        lbl=`<span style="font-size:0.62rem;font-family:monospace;color:#f78166;font-weight:700">FRONT↓</span>`;
      else if (j===queue.length-1)
        lbl=`<span style="font-size:0.62rem;font-family:monospace;color:#3fb950;font-weight:700">REAR↓</span>`;
      h+=`<div style="display:inline-flex;flex-direction:column;align-items:center">`;
      h+=`<div style="height:22px;display:flex;align-items:center;justify-content:center;gap:4px">${lbl}</div>`;
      h+=mkNode(queue[j],nxt,cls);
      h+=`</div>`;
      if (j<queue.length-1) h+=`<div class="node-arr" style="align-self:flex-end;padding-bottom:13px">→</div>`;
    }
    h+=`<div class="node-arr" style="align-self:flex-end;padding-bottom:13px">→</div>`;
    h+=`<div class="null-box" style="align-self:flex-end;padding-bottom:5px">NULL</div>`;
  }
  h+=`</div>`;

  if (curr!==null) {
    h+=`<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;background:#131d2e;border:1px solid #1565c0;border-radius:8px;padding:10px 18px">`;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">`;
    h+=`<div style="font-size:0.68rem;color:#e3b341;font-weight:700">curr (dequeued)</div>`;
    h+=`<div class="node-box n-curr" style="animation:none;min-width:70px"><div class="nd" style="font-size:1.4rem;color:#e3b341">${curr}</div><div class="nn"><div class="nl">curr</div></div></div>`;
    h+=`</div>`;
    if (output.length<5) {
      h+=`<div style="font-size:1.2rem;color:#6e7681">→</div>`;
      h+=`<div style="display:flex;flex-direction:column;gap:8px">`;
      h+=`<div style="display:flex;align-items:center;gap:10px">`;
      h+=`<div class="node-box" style="border-color:#238636;min-width:64px"><div class="nd" style="color:#3fb950;font-size:1.1rem">${curr*10}</div><div class="nn"><div class="nl">next</div><div class="nv">→NULL</div></div></div>`;
      h+=`<span style="font-size:0.75rem;font-family:monospace;color:#6e7681">${curr} × 10 &nbsp;<span style="color:#5a6370">(append 0)</span></span>`;
      h+=`</div>`;
      h+=`<div style="display:flex;align-items:center;gap:10px">`;
      h+=`<div class="node-box" style="border-color:#238636;min-width:64px"><div class="nd" style="color:#3fb950;font-size:1.1rem">${curr*10+1}</div><div class="nn"><div class="nl">next</div><div class="nv">→NULL</div></div></div>`;
      h+=`<span style="font-size:0.75rem;font-family:monospace;color:#6e7681">${curr} × 10 + 1 <span style="color:#5a6370">(append 1)</span></span>`;
      h+=`</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }


  h+=`<div class="vars-row"><div class="vchip"><span class="vn">i</span><span class="veq">=</span><span class="vv">${i}</span></div><div class="vchip"><span class="vn">n</span><span class="veq">=</span><span class="vv">5</span></div></div>`;


  if (output&&output.length>0) {
    h+=`<div class="out-box" style="text-align:center">`;
    h+=`<div class="out-lbl">printf output — <code>%d</code> integers:</div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px">`;
    output.forEach(v=>h+=`<div style="background:#12261e;border:1px solid #238636;border-radius:5px;padding:4px 14px;font-family:monospace;font-size:1rem;color:#3fb950;font-weight:700">${v}</div>`);
    h+=`</div>`;
    if (output.length===5) h+=`<div style="color:#3fb950;font-size:0.8rem;margin-top:8px;">✓ First 5 binary numbers generated!</div>`;
    h+=`</div>`;
  }

  h+=`</div>`;
  return h;
}

const RENDERERS = [renderStack1,renderQueue2,renderSort3,renderBinary4];
const OP_BADGE = {push:'ob-push push',pop:'ob-pop pop',enq:'ob-enq enqueue',deq:'ob-deq dequeue',disp:'ob-disp display',sort:'ob-sort sort',bin:'ob-bin binary',rev:'ob-rev reverse',init:'ob-init init'};


let curEx = 0, curStep = 0;

function render() {
  const steps = STEPS[curEx];
  const step = steps[curStep];
  // Code
  const code = CODE[curEx];
  const hlSet = new Set(step.lines||[]);
  let codeHtml = '';
  code.forEach((line,i)=>{
    const hl = hlSet.has(i)?'hl':'';
    codeHtml+=`<div class="cl ${hl}"><span class="ln">${i+1}</span><span class="lc">${line}</span></div>`;
  });
  document.getElementById('code-scroll').innerHTML = codeHtml;
  document.getElementById('code-fname').textContent = FNAMES[curEx];

  const hlEl = document.querySelector('.cl.hl');
  if(hlEl) hlEl.scrollIntoView({block:'nearest',behavior:'smooth'});

  document.getElementById('viz-canvas').innerHTML = RENDERERS[curEx](step.state);

  const op = step.op||'';
  const badgeCls = OP_BADGE[op]||'ob-init';
  const [bc,bl] = badgeCls.split(' ');
  document.getElementById('step-desc').innerHTML = `<span class="op-badge ${bc}">${bl||op}</span> &nbsp;${step.text}`;

  let dots='';
  for(let i=0;i<steps.length;i++){
    const cls = i<curStep?'done':(i===curStep?'cur':'');
    dots+=`<div class="dot ${cls}" onclick="goStep(${i})" title="Step ${i+1}"></div>`;
  }
  document.getElementById('dots').innerHTML=dots;
  document.getElementById('s-count').textContent=`Step ${curStep+1}/${steps.length}`;
  document.getElementById('btn-p').disabled = curStep===0;
  document.getElementById('btn-n').disabled = curStep===steps.length-1;
}

function nextStep(){if(curStep<STEPS[curEx].length-1){curStep++;render();}}
function prevStep(){if(curStep>0){curStep--;render();}}
function resetEx(){curStep=0;render();}
function goStep(i){curStep=i;render();}
function switchEx(i){
  curEx=i;curStep=0;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  render();
}


document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextStep();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevStep();
});

render();
</script>
